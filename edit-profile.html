<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Greentech – Edit Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary: #43a047;
      --secondary: #66bb6a;
      --accent: #a5d6a7;
      --mint: #e8f5e9;
      --text: #2e4a38;
      --dark-green: #2e7d32;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 20%, #e8f5e9 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, #c6e5b6 0%, transparent 40%),
                  linear-gradient(135deg, #f6fff6, #fffaf2);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    header {
      background: linear-gradient(135deg, #4b9b4d, #bcfabf, #0c500f);
      color: white;
      padding: 22px 20px;
      border-radius: 0 0 28px 28px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(46,125,50,.3);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      position: absolute;
      left: 20px;
      font-size: 1.6rem;
      cursor: pointer;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.1rem;
      margin: 0;
    }

    .container {
      max-width: 520px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .profile-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .avatar-container {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto 16px;
    }

    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid white;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .edit-avatar-btn {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: var(--primary);
      color: white;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(67,160,71,0.4);
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--dark-green);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #dcedc8;
      border-radius: 16px;
      background: white;
      font-size: 1rem;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67,160,71,0.15);
    }

    .form-group textarea {
      min-height: 110px;
      resize: vertical;
    }

    .save-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 30px;
      transition: 0.3s;
    }

    .save-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(67,160,71,0.35);
    }

    .bottom-nav {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 440px;
      background: white;
      border-radius: 30px;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      box-shadow: 0 14px 38px rgba(0,0,0,.14);
      z-index: 100;
    }

    .nav-item {
      text-align: center;
      color: #6b8e6b;
      font-size: 0.72rem;
      cursor: pointer;
      transition: .3s;
      flex: 1;
    }

    .nav-item i {
      font-size: 1.6rem;
      display: block;
      margin-bottom: 4px;
    }

    .nav-item:hover { transform: translateY(-5px); color: var(--dark-green); }
    .nav-item.active { color: var(--dark-green); font-weight: 600; }
  </style>
</head>
<body>

  <header>
    <div class="back-btn" onclick="window.history.back()">
      <i class="fas fa-arrow-left"></i>
    </div>
    <h1>Edit Profile</h1>
  </header>

  <div class="container">

    <div class="profile-header">
      <div class="avatar-container">
        <img id="profileAvatar" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400" alt="Profile" class="avatar">
        <div class="edit-avatar-btn" onclick="document.getElementById('avatarInput').click()">
          <i class="fas fa-camera"></i>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
      </div>
      <h2 id="displayName">Reya Stacy Gaddam</h2>
      <p style="color:#666;">Hyderabad, Telangana</p>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullName" value="Reya Stacy Gaddam">
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" value="reyagaddam">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" value="reya.stacy@example.com">
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" value="+91 98765 43210">
    </div>

    <div class="form-group">
      <label>City / Location</label>
      <input type="text" id="city" value="Hyderabad, Telangana">
    </div>

    <div class="form-group">
      <label>Bio / About Me</label>
      <textarea id="bio" rows="4">Passionate home gardener who loves growing herbs, vegetables, and rare indoor plants. Always learning new sustainable techniques! 🌿</textarea>
    </div>

    <div class="form-group">
      <label>Gardening Experience Level</label>
      <select id="level">
        <option value="beginner">Beginner Gardener</option>
        <option value="intermediate" selected>Intermediate Gardener</option>
        <option value="advanced">Advanced Gardener</option>
        <option value="expert">Expert Gardener</option>
      </select>
    </div>

    <button class="save-btn" onclick="saveProfile()">Save Changes</button>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
    <a href="my-plants.html" class="nav-item"><i class="fas fa-leaf"></i>My Plants</a>
    <a href="community.html" class="nav-item"><i class="fas fa-users"></i>Community</a>
    <a href="marketplace.html" class="nav-item"><i class="fas fa-store"></i>Marketplace</a>
    <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i>Profile</a>
  </nav>

  <script>
    function previewAvatar(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('profileAvatar').src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function saveProfile() {
      const name = document.getElementById('fullName').value.trim();
      if (!name) {
        alert("Please enter your full name");
        return;
      }

      alert(`✅ Profile updated successfully!\n\nWelcome back, ${name.split(' ')[0]}! 🌿`);
      
      // In real app, save to Firebase here
      setTimeout(() => {
        window.location.href = "profile.html";
      }, 800);
    }
  </script>
</body>
</html>
