<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Greentech – My Plants</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary: #43a047;
      --secondary: #66bb6a;
      --accent: #a5d6a7;
      --mint: #e8f5e9;
      --text: #2e4a38;
      --dark-green: #2e7d32;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 20%, #e8f5e9 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, #c6e5b6 0%, transparent 40%),
                  linear-gradient(135deg, #f6fff6, #fffaf2);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    body::after {
      content: "";
      position: fixed;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, #66bb6a, transparent);
      filter: blur(130px);
      opacity: .25;
      top: -120px;
      right: -120px;
      z-index: -1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 20px;
      background: linear-gradient(135deg, #4b9b4d, #bcfabf, #0c500f);
      color: white;
      box-shadow: 0 8px 24px rgba(46,125,50,.3);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.3rem;
      letter-spacing: .4px;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .leaf-bounce {
      font-size: 1.8rem;
      animation: gentleBounce 3s infinite ease-in-out;
    }

    @keyframes gentleBounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    .add-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.9rem;
      cursor: pointer;
      transition: all 0.3s;
      animation: pulseBounce 2.4s infinite ease-in-out;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .add-btn:hover {
      transform: translateY(-6px) scale(1.12);
      background: rgba(255,255,255,0.45);
      animation-play-state: paused;
    }

    @keyframes pulseBounce {
      0%, 100% { transform: scale(1) translateY(0); }
      50%      { transform: scale(1.08) translateY(-8px); }
    }

    .search-bar { padding: 16px 20px; }

    .search-input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      border: none;
      border-radius: 50px;
      background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%236b8e6b" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>') no-repeat 16px center;
      background-size: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      font-size: 1rem;
      transition: all 0.3s;
    }

    .search-input:focus {
      outline: none;
      box-shadow: 0 8px 24px rgba(67,160,71,0.25);
      transform: scale(1.01);
    }

    .filters {
      display: flex;
      gap: 10px;
      padding: 0 20px 16px;
      overflow-x: auto;
      white-space: nowrap;
    }

    .filter-chip {
      padding: 10px 18px;
      border-radius: 50px;
      background: white;
      border: 1px solid #dcedc8;
      font-size: 0.92rem;
      color: #4a704a;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .filter-chip:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(67,160,71,0.15); }

    .filter-chip.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      font-weight: 500;
    }

    .plants-container { padding: 0 20px 80px; }

    .plants-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    .plant-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: all 0.35s;
    }

    .plant-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 18px 40px rgba(67,160,71,0.22);
    }

    .plant-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      transition: transform 0.5s;
    }

    .plant-card:hover .plant-img { transform: scale(1.08); }

    .plant-info { padding: 14px; }

    .plant-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--dark-green);
      margin-bottom: 4px;
    }

    .plant-type {
      font-size: 0.88rem;
      color: #6b8e6b;
      margin-bottom: 10px;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.92rem;
      font-weight: 500;
    }

    .status-text.thirsty { color: #e53935; }
    .status-text.soon    { color: #f57c00; }
    .status-text.good    { color: var(--primary); }

    .health-ring {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3.5px solid;
      transition: all 1.2s;
    }

    .health-good  { border-color: var(--primary); }
    .health-warn  { 
      border-color: #FFB74D; 
      animation: slowPulse 2s infinite ease-in-out; 
    }
    .health-bad   { 
      border-color: #EF5350; 
      animation: slowPulse 1.4s infinite ease-in-out; 
    }

    @keyframes slowPulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.15); }
    }

    .empty-state {
      text-align: center;
      padding: 120px 30px;
      color: #6b8e6b;
    }

    .empty-state h2 {
      font-family: 'Playfair Display', serif;
      color: var(--dark-green);
      margin-bottom: 12px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 440px;
      background: white;
      border-radius: 30px;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      box-shadow: 0 14px 38px rgba(0,0,0,.14);
      z-index: 100;
    }

    .nav-item {
      text-align: center;
      color: #6b8e6b;
      font-size: 0.72rem;
      cursor: pointer;
      transition: .3s;
      flex: 1;
      text-decoration: none;
    }

    .nav-item i {
      font-size: 1.6rem;
      display: block;
      margin-bottom: 4px;
    }

    .nav-item:hover { transform: translateY(-4px); color: var(--dark-green); }

    .nav-item.active { color: var(--dark-green); font-weight: 600; }
  </style>
</head>

<body>

<header>
  <h1>My Plants <span class="leaf-bounce">🍃</span></h1>
  <div class="add-btn" onclick="window.location.href='add-plant.html'">
    <i class="fas fa-plus"></i>
  </div>
</header>

<div id="mainView">
  <div class="search-bar">
    <input type="text" class="search-input" placeholder="Search your green friends..." id="searchInput">
  </div>

  <div class="filters">
    <div class="filter-chip active" data-filter="all">All</div>
    <div class="filter-chip" data-filter="Indoor">Indoor</div>
    <div class="filter-chip" data-filter="Outdoor">Outdoor</div>
    <div class="filter-chip" data-filter="Herbs">Herbs</div>
    <div class="filter-chip" data-filter="Needs Care">Needs Care</div>
  </div>

  <div class="plants-container" id="plantsContainer"></div>
</div>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item" id="navHome"><i class="fas fa-home"></i>Home</a>
  <div class="nav-item active" id="navMyPlants"><i class="fas fa-leaf"></i>My Plants</div>
  <a href="community.html" class="nav-item"><i class="fas fa-users"></i>Community</a>
  <a href="home.html?show=floramart" class="nav-item" id="navFloraMart"><i class="fas fa-shopping-basket"></i>FloraMart</a>
  <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i>Profile</a>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB8VCNt8j5j8CTVpAKx6JP_KL7sC2-zuTI",
    authDomain: "prasad-prasad.firebaseapp.com",
    projectId: "prasad-prasad",
    appId: "1:717181544551:web:0780889ae05aa41bbe0cc2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let currentUID = null;

  document.getElementById('navFloraMart').onclick = () => {
    window.location.href = "home.html?show=floramart";
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUID = user.uid;
      loadPlants();
    } else {
      window.location.href = "index.html";
    }
  });

  function getFunWaterMessage(days) {
    if (!days || isNaN(days)) return "Check me soon! 🌱";
    const numDays = parseInt(days, 10);

    if (numDays <= 0) return "Thirsty now! 😩💦";
    if (numDays === 1) return "Water me tomorrow! 🥺";
    if (numDays <= 3) return `Water me in ${numDays} days! 💦`;
    return `Good for ${numDays} days 🌿✨`;
  }

  function loadPlants(filter = 'all') {
    const container = document.getElementById('plantsContainer');
    container.innerHTML = '';

    if (!currentUID) return;

    let plants = JSON.parse(localStorage.getItem(`greentechPlants_${currentUID}`) || '[]');

    if (plants.length === 0) {
      plants = [
        {
          id: 1,
          name: "Monstera Deliciosa",
          type: "Indoor",
          image: "https://plantsguru.com/cdn/shop/files/Monstera_Deliciosa_Swiss_Cheese_Plant.jpg",
          nextWater: "In 2 days",
          health: "good"
        }
      ];
    }

    if (filter !== 'all') {
      plants = filter === 'Needs Care'
        ? plants.filter(p => p.health !== 'good')
        : plants.filter(p => p.type === filter);
    }

    if (plants.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <h2>No plants yet 🌱</h2>
          <p>Add your first plant buddy! 🍃</p>
        </div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'plants-grid';

    plants.forEach(plant => {
      const card = document.createElement('div');
      card.className = 'plant-card';
      
      const waterText = plant.nextWater || "Check me soon!";
      const daysMatch = waterText.match(/(\d+)/);
      const days = daysMatch ? daysMatch[1] : null;
      const funMessage = getFunWaterMessage(days);
      const messageClass = 
        funMessage.includes("now")   ? "thirsty" :
        funMessage.includes("tomorrow") || funMessage.includes("in ") ? "soon" : "good";

      card.innerHTML = `
        <img class="plant-img" src="${plant.image}" alt="${plant.name}">
        <div class="plant-info">
          <div class="plant-name">${plant.name}</div>
          <div class="plant-type">${plant.type}</div>
          <div class="status-bar">
            <div class="health-ring health-${plant.health || 'good'}"></div>
            <div class="status-text ${messageClass}">${funMessage}</div>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    container.appendChild(grid);

    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    if (searchTerm) {
      document.querySelectorAll('.plant-card').forEach(card => {
        const name = card.querySelector('.plant-name').textContent.toLowerCase();
        card.style.display = name.includes(searchTerm) ? 'block' : 'none';
      });
    }
  }

  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      loadPlants(chip.dataset.filter);
    });
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    const term = e.target.value.toLowerCase();
    document.querySelectorAll('.plant-card').forEach(card => {
      const name = card.querySelector('.plant-name').textContent.toLowerCase();
      card.style.display = name.includes(term) ? 'block' : 'none';
    });
  });
</script>

</body>
</html>
