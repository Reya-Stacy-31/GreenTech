<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Greentech – Join the Green Journey</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.1);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
    }

    .form-header {
      background: #4CAF50;
      color: white;
      padding: 2.8rem 2rem 2rem;
      text-align: center;
    }

    .form-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
    }

    .form-header h1 span { color: #a5d6a7; }

    .tabs {
      display: flex;
      background: #f8faf5;
    }

    .tab {
      flex: 1;
      padding: 1.1rem;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 4px solid transparent;
    }

    .tab.active {
      background: white;
      color: #2e7d32;
      border-bottom: 4px solid #4CAF50;
    }

    .form-body { padding: 2.2rem; }

    .form-group { margin-bottom: 1.5rem; }

    label { margin-bottom: 0.5rem; display: block; }

    input {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      border: 1.5px solid #ccc;
    }

    .btn {
      width: 100%;
      padding: 1.1rem;
      background: #4CAF50;
      color: white;
      border-radius: 50px;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .error {
      color: red;
      text-align: center;
      margin-top: 0.8rem;
      font-size: 0.9rem;
    }

    .back-to-home {
      text-align: center;
      margin-top: 1.5rem;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="form-header">
    <h1>Green<span>tech</span> 🌿</h1>
    <p>Welcome to your smart gardening journey</p>
  </div>

  <div class="tabs">
    <div class="tab" data-tab="login">Log In</div>
    <div class="tab" data-tab="signup">Sign Up</div>
  </div>

  <div class="form-body">

    <!-- LOGIN -->
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" autocomplete="off" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </div>

      <button class="btn">Log In</button>
      <div class="error" id="loginError"></div>
    </form>

    <!-- SIGNUP -->
    <form id="signupForm" autocomplete="off" style="display:none;">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" autocomplete="off" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" autocomplete="off" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" autocomplete="new-password" required>
      </div>

      <button class="btn">Create Account</button>
      <div class="error" id="signupError"></div>
    </form>

    <div class="back-to-home">
      <a href="index.html">← Back to Home</a>
    </div>

  </div>
</div>

<!-- 🔥 FIREBASE AUTH + UI LOGIC -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB8VCNt8j5j8CTVpAKx6JP_KL7sC2-zuTI",
    authDomain: "prasad-prasad.firebaseapp.com",
    projectId: "prasad-prasad",
    appId: "1:717181544551:web:0780889ae05aa41bbe0cc2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const loginForm = document.getElementById("loginForm");
  const signupForm = document.getElementById("signupForm");
  const loginTab = document.querySelector('[data-tab="login"]');
  const signupTab = document.querySelector('[data-tab="signup"]');
  const tabs = document.querySelectorAll(".tab");

  function clearForms() {
    loginForm.reset();
    signupForm.reset();
    loginError.textContent = "";
    signupError.textContent = "";
  }

  function showLogin() {
    clearForms();
    tabs.forEach(t => t.classList.remove("active"));
    loginTab.classList.add("active");
    loginForm.style.display = "block";
    signupForm.style.display = "none";
    window.location.hash = "login";
  }

  function showSignup() {
    clearForms();
    tabs.forEach(t => t.classList.remove("active"));
    signupTab.classList.add("active");
    signupForm.style.display = "block";
    loginForm.style.display = "none";
    window.location.hash = "signup";
  }

  // 🔥 Beat browser autofill (critical)
  window.addEventListener("load", () => {
    setTimeout(() => {
      clearForms();
      if (window.location.hash === "#signup") {
        showSignup();
      } else {
        showLogin();
      }
    }, 60);
  });

  loginTab.onclick = showLogin;
  signupTab.onclick = showSignup;

  loginForm.onsubmit = e => {
    e.preventDefault();
    signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value)
      .then(() => window.location.href = "home.html")
      .catch(err => loginError.textContent = err.message);
  };

import { updateProfile } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

signupForm.onsubmit = async (e) => {
  e.preventDefault();

  try {
    const userCredential = await createUserWithEmailAndPassword(
      auth,
      signupEmail.value,
      signupPassword.value
    );

    await updateProfile(userCredential.user, {
      displayName: fullName.value.trim()
    });

    window.location.href = "home.html";

  } catch (err) {
    signupError.textContent = err.message;
  }
};
</script>

</body>
</html>
