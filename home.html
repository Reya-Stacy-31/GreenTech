<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Greentech | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --primary: #43a047;
      --secondary: #66bb6a;
      --accent: #a5d6a7;
      --mint: #e8f5e9;
      --text: #2e4a38;
      --dark-green: #2e7d32;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 20%, #e8f5e9 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, #c6e5b6 0%, transparent 40%),
                  linear-gradient(135deg, #f6fff6, #fffaf2);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    body::after {
      content: "";
      position: fixed;
      width: 420px; height: 420px;
      background: radial-gradient(circle, #66bb6a, transparent);
      filter: blur(130px); opacity: .25;
      top: -120px; right: -120px; z-index: -1;
    }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 22px 20px;
      background: linear-gradient(135deg, #4b9b4d, #bcfabf, #0c500f);
      color: white;
      box-shadow: 0 8px 24px rgba(46,125,50,.3);
      position: sticky; top: 0; z-index: 10;
    }

    .header-content { width: 100%; display: flex; justify-content: space-between; align-items: center; }
    .greeting h1 { font-family: 'Playfair Display', serif; font-size: 2.1rem; letter-spacing: .4px; margin: 0; }
    .greeting p { font-size: 0.95rem; opacity: 0.92; margin-top: 3px; }

    .weather-pill {
      background: rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.45);
      backdrop-filter: blur(10px);
      padding: 10px 16px; border-radius: 28px;
      font-size: 0.9rem; text-align: right; min-width: 130px;
    }

    .quick-strip {
      margin: 0 20px 28px;
      display: flex;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 30px;
      padding: 12px 10px;
      box-shadow: 0 10px 28px rgba(67,160,71,0.15);
      justify-content: space-around;
    }

    .action-btn {
      flex: 0 0 60px; min-width: 60px;
      text-align: center; background: none; border: none;
      color: var(--dark-green); cursor: pointer; transition: 0.3s;
    }
    .action-btn:hover { transform: translateY(-3px); }
    .action-btn i { font-size: 1.8rem; display: block; margin-bottom: 3px; }

    #uploadInput { display: none; }

    .view-container { padding: 0 20px; max-width: 340px; margin: auto; }
    .section-title { margin: 20px 0 16px; font-family: 'Playfair Display', serif; font-size: 1.65rem; color: var(--dark-green); }

    .task-card {
      background: white; border-radius: 22px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06); transition: 0.35s;
      border-left: 5px solid var(--primary);
    }
    .task-card:hover { transform: translateY(-5px); box-shadow: 0 14px 32px rgba(67,160,71,0.18); }
    .task-icon { font-size: 2.2rem; min-width: 40px; text-align: center; }
    .task-info { flex: 1; }
    .task-info strong { display: block; font-size: 1.05rem; color: var(--dark-green); }

    .delete-btn { color: #e53935; font-size: 1.4rem; cursor: pointer; }

    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
      align-items: center; justify-content: center; z-index: 500;
    }
    .modal-content { width: 90%; max-width: 440px; background: white; border-radius: 28px; padding: 26px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { font-size: 0.9rem; font-weight: 600; color: #4a704a; margin-bottom: 6px; display: block; }
    .form-group input, .form-group select { width: 100%; padding: 13px; border-radius: 14px; border: 1px solid #dcedc8; background: #fafffa; }

    .btn { width: 100%; padding: 14px; border-radius: 18px; border: none; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
    .btn-secondary { background: #e8f5e9; color: var(--dark-green); }

    .bottom-nav {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      width: 92%; max-width: 430px; background: white; border-radius: 30px;
      display: flex; justify-content: space-around; padding: 12px 0;
      box-shadow: 0 14px 38px rgba(0,0,0,.14);
    }
    .nav-item { text-align: center; color: #6b8e6b; cursor: pointer; transition: .3s; }
    .nav-item i { font-size: 1.55rem; display: block; margin-bottom: 3px; }
  </style>
</head>
<body>

  <header>
    <div class="header-content">
      <div class="greeting">
        <h1 id="greetingText">Good evening, 🌿</h1>
        <p>Your green family is waiting</p>
      </div>
      <div class="weather-pill">
        <div id="w-location">Locating…</div>
        <div id="w-desc">Fetching weather…</div>
      </div>
    </div>
  </header>

  <div class="quick-strip">
    <button class="action-btn" id="openRemindersBtn" title="Reminders"><i class="fas fa-bell"></i></button>
    <!-- <label class="action-btn" for="uploadInput" title="Upload Plant" style="cursor: pointer;"><i class="fas fa-upload"></i></label> -->
    <input type="file" id="uploadInput" accept="image/*" style="display:none;">
    <a class="action-btn" href="my-plants.html" title="My Plants"><i class="fas fa-leaf"></i></a>
    <a class="action-btn" href="https://plant.id/new_identification" title="Scan Plant"><i class="fas fa-camera"></i></a>
    <a class="action-btn" href="ask-expert.html" title="Ask Expert"><i class="fas fa-headset"></i></a>
    <button class="action-btn" id="logoutBtn" title="Logout"><i class="fas fa-power-off" style="color:#e53935"></i></button>
  </div>

  <div class="view-container">
    <h2 class="section-title">Today's Reminders</h2>
    <div id="remindersList"></div>
  </div>

  <div class="modal" id="reminderModal">
    <div class="modal-content">
      <h2 style="margin-bottom:1.2rem; font-family:'Playfair Display',serif; color:var(--dark-green);">New Reminder</h2>
      <form id="reminderForm">
        <div class="form-group"><label>Task *</label><input id="title" required></div>
        <div class="form-group"><label>Icon</label>
          <select id="icon">
            <option value="💧">💧 Water</option><option value="🌱">🌱 Feed</option>
            <option value="☀️">☀️ Sunlight</option><option value="💨">💨 Mist</option>
            <option value="✂️">✂️ Prune</option>
          </select>
        </div>
        <div class="form-group"><label>Date & Time *</label><input type="datetime-local" id="datetime" required></div>
        <div class="form-group"><label>Repeat</label>
          <select id="frequency">
            <option value="once">One-time</option><option value="daily">Daily</option>
            <option value="weekly">Weekly</option><option value="monthly">Monthly</option>
          </select>
        </div>
        <button class="btn btn-primary">Save Reminder</button>
        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
      </form>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item" onclick="goTo('home.html')"><i class="fas fa-home"></i>Home</div>
    <div class="nav-item" onclick="goTo('my-plants.html')"><i class="fas fa-leaf"></i>My Plants</div>
    <div class="nav-item" onclick="goTo('community.html')"><i class="fas fa-users"></i>Community</div>
    <div class="nav-item" onclick="goTo('profile.html')"><i class="fas fa-user-circle"></i>Profile</div>
  </nav>

  <script>function goTo(page){ window.location.href = page; }</script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const config = {
      apiKey: "AIzaSyB8VCNt8j5j8CTVpAKx6JP_KL7sC2-zuTI",
      authDomain: "prasad-prasad.firebaseapp.com",
      projectId: "prasad-prasad",
      appId: "1:717181544551:web:0780889ae05aa41bbe0cc2"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const remindersList = document.getElementById("remindersList");
    const reminderModal = document.getElementById("reminderModal");
    const datetimeInput = document.getElementById("datetime");
    const uploadInput = document.getElementById("uploadInput");

    onAuthStateChanged(auth, user => {
      if (!user) location.href = "index.html";
      const h = new Date().getHours();
      const greet = h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
      document.getElementById("greetingText").textContent = `${greet}, ${user.displayName || user.email.split("@")[0]} 🌿`;
      
      setMinDateTime();
      loadWeather();
      loadTasks(user.uid);
    });

    // Handle Upload Trigger
    uploadInput.addEventListener('change', (e) => {
      if (e.target.files[0]) alert(`Selected: ${e.target.files[0].name}. Ready to upload!`);
    });

    function setMinDateTime(){
      const now = new Date();
      now.setSeconds(0,0);
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      datetimeInput.min = now.toISOString().slice(0,16);
    }

    async function loadTasks(uid) {
      remindersList.innerHTML = "";
      
      // Calculate today's boundaries (Current Date Only)
      const todayStart = new Date();
      todayStart.setHours(0, 0, 0, 0);
      const todayEnd = new Date();
      todayEnd.setHours(23, 59, 59, 999);

      try {
        const q = query(collection(db, "users", uid, "reminders"), orderBy("datetime"));
        const snap = await getDocs(q);
        
        let count = 0;
        snap.forEach(d => {
          const t = d.data();
          const taskDate = new Date(t.datetime);

          // Only display if the reminder date matches today
          if (taskDate >= todayStart && taskDate <= todayEnd) {
            count++;
            const card = document.createElement("div");
            card.className = "task-card";
            card.innerHTML = `
              <div class="task-icon">${t.icon}</div>
              <div class="task-info">
                <strong>${t.title}</strong>
                <small>${taskDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} • ${t.frequency}</small>
              </div>
              <i class="fas fa-trash delete-btn"></i>
            `;
            card.querySelector(".delete-btn").onclick = async () => {
              await deleteDoc(doc(db, "users", uid, "reminders", d.id));
              loadTasks(uid);
            };
            remindersList.appendChild(card);
          }
        });

        if (count === 0) remindersList.innerHTML = "<p style='text-align:center; opacity:0.6;'>No reminders for today.</p>";
      } catch (err) { console.error("Error loading tasks:", err); }
    }

    function loadWeather(){
      navigator.geolocation.getCurrentPosition(async pos => {
        try {
          const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=6edc49354ce2f5aaf2ab30e37d42c25e&units=metric`);
          const data = await res.json();
          document.getElementById("w-location").textContent = `${data.name} • ${Math.round(data.main.temp)}°C`;
          document.getElementById("w-desc").textContent = data.weather[0].description;
        } catch (e) { document.getElementById("w-desc").textContent = "Weather unavailable"; }
      });
    }

    document.getElementById("openRemindersBtn").onclick = () => reminderModal.style.display="flex";
    document.getElementById("cancelBtn").onclick = () => reminderModal.style.display="none";
    document.getElementById("logoutBtn").onclick = () => signOut(auth);

    document.getElementById("reminderForm").onsubmit = async e => {
      e.preventDefault();
      try {
        await addDoc(collection(db, "users", auth.currentUser.uid, "reminders"), {
          title: document.getElementById("title").value,
          icon: document.getElementById("icon").value,
          datetime: datetimeInput.value,
          frequency: document.getElementById("frequency").value
        });
        reminderModal.style.display = "none";
        document.getElementById("reminderForm").reset();
        loadTasks(auth.currentUser.uid);
      } catch (err) { alert("Error saving reminder."); }
    };
  </script>
</body>
</html>
